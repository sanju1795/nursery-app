<div class="container mt-5">

  <h2 class="mb-4">🛒 My Cart</h2>

  <!-- EMPTY CART -->
  <div *ngIf="cartItems.length === 0" class="text-center mt-5">
    <h4>Your cart is empty 😔</h4>
  </div>

  <div class="row" *ngIf="cartItems.length > 0">

    <!-- LEFT SIDE (ITEMS) -->
    <div class="col-md-8">

      <div class="card mb-3 p-3 shadow-sm"
           *ngFor="let item of cartItems">

        <div class="row align-items-center">

          <!-- IMAGE -->
          <div class="col-md-3">
            <img [src]="item.image" class="img-fluid rounded">
          </div>

          <!-- DETAILS -->
          <div class="col-md-5">
            <h5>{{item.name}}</h5>
            <p class="text-success">₹{{item.price}}</p>
          </div>

          <!-- QUANTITY -->
          <div class="col-md-2 text-center">
            <button class="btn btn-outline-success btn-sm"
                    (click)="decreaseQty(item)">-</button>

            <span class="mx-2">{{item.quantity}}</span>

            <button class="btn btn-outline-success btn-sm"
                    (click)="increaseQty(item)">+</button>
          </div>

          <!-- REMOVE -->
          <div class="col-md-2 text-end">
            <button class="btn btn-danger btn-sm"
                    (click)="removeItem(item)">
              Remove
            </button>
          </div>

        </div>

      </div>

    </div>

    <!-- RIGHT SIDE (SUMMARY) -->
    <div class="col-md-4">

      <div class="card p-3 shadow-sm">

        <h4>Price Details</h4>

        <hr>

        <p>Total Items: {{cartItems.length}}</p>

        <h5 class="text-success">
          Total: ₹{{totalAmount}}
        </h5>

        <button class="btn btn-success w-100 mt-3" routerLink="/checkout">
          Proceed to Chekout
        </button>

      </div>

    </div>

  </div>

</div>
