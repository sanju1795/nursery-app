<div class="container mt-5">

  <h2 class="mb-4">🧾 Checkout</h2>

  <div class="row">

    <!-- 🛒 LEFT SIDE (Products) -->
    <div class="col-md-7">

      <div *ngFor="let item of cartItems" class="card p-3 mb-3 shadow-sm">

        <div class="d-flex justify-content-between">
          <h5>{{ item.name }}</h5>
          <h5 class="text-success">₹{{ item.price }}</h5>
        </div>

        <p class="mb-0">Quantity: {{ item.quantity }}</p>

      </div>

    </div>

    <!-- 📍 RIGHT SIDE (Address + Summary) -->
    <div class="col-md-5">

      <!-- ADDRESS CARD -->
      <div class="card p-3 shadow-sm mb-3">

        <h4 class="mb-3">📍 Delivery Address</h4>

        <input type="text" class="form-control mb-2"
               placeholder="Full Name"
               [(ngModel)]="address.name">

        <input type="text" class="form-control mb-2"
               placeholder="Mobile Number"
               [(ngModel)]="address.phone">

        <input type="text" class="form-control mb-2"
               placeholder="City"
               [(ngModel)]="address.city">

        <textarea class="form-control mb-2"
                  placeholder="Full Address"
                  [(ngModel)]="address.fullAddress"></textarea>
        <input type="text" class="form-control mb-2"
       placeholder="Pincode"
       [(ngModel)]="address.pincode">

        <!-- 📍 LIVE LOCATION BUTTON -->
        <button class="btn btn-outline-primary w-100"
                (click)="getLocation()">
          📍 Use My Current Location
        </button>

      </div>

      <!-- 💰 PRICE SUMMARY -->
      <div class="card p-3 shadow-sm">

        <h5>Price Details</h5>
        <hr>

        <p>Total Items: {{ cartItems.length }}</p>

        <h4 class="text-success">
          ₹{{ total }}
        </h4>

        <button class="btn btn-success w-100 mt-3"
                (click)="placeOrder()">
          🛍️ Place Order
        </button>


      <button class="btn btn-secondary w-100 mt-2"
        (click)="saveAddress()">
  💾 Save Address
</button>
      </div>

      <div *ngIf="addresses.length > 0" class="card p-3 mt-3">

  <h5>Saved Addresses</h5>

  <div *ngFor="let addr of addresses"
       class="border p-2 mb-2"
       (click)="selectAddress(addr)"
       style="cursor:pointer">

    <b>{{ addr.name }}</b> ({{ addr.phone }})<br>
    {{ addr.fullAddress }}

  </div>

</div>
    </div>

  </div>

</div>
