<div class="container mt-4">

  <h2 class="mb-4 fw-bold">🌿 Our Plants</h2>

  <div class="row">

    <div class="col-md-3 mb-4" *ngFor="let plant of plants">

      <div class="card product-card shadow-sm h-100"
           [routerLink]="['/product', plant._id]">

<img [src]="'http://localhost:3000/uploads/' + plant.image" class="card-img-top" 
style="height:150px; object-fit:cover;">
        <div class="card-body text-center">

          <h5>{{ plant.name }}</h5>

          <p class="text-muted">{{ plant.category?.name }}</p>

          <p class="text-muted">{{ plant.type }}</p>
          
          <p class="text-success fw-bold">₹{{ plant.price }}</p>

        </div>

      </div>

    </div>

  </div>

</div>
