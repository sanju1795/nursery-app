<div class="container-fluid">

  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="fw-bold">Products</h2>

    <button class="btn btn-success" data-bs-toggle="modal" data-bs-target="#addProductModal">
      + Add Product
    </button>
  </div>
  
  <div class="card shadow-sm border-0">
    <div class="card-body">

      <table class="table table-hover align-middle">

        <thead class="table-light">
          <tr>
            <th>#</th>
            <th>Image</th>
            <th>Name</th>
            <th>Category</th>
            <th>Price</th>
            <th>Stock</th>
            <th>Action</th>
          </tr>
        </thead>

        <tbody>

          @for (product of products; track product._id) {
            <tr>
              <td>{{$index + 1}}</td>

              <td>
                <img [src]="'http://localhost:3000/uploads/' + product.image"  width="50">
              </td>

              <td>{{ product.name }}</td>
              <td>{{ product.category?.name }}</td>
              <td>₹{{ product.price }}</td>
              <td>{{ product.stock }}</td>

              <td>
                <button class="btn btn-sm btn-danger" (click)="deleteProduct(product._id)">
                  Delete
                </button>
              </td>
            </tr>
          }

        </tbody>

      </table>

    </div>
  </div>

</div>


<!-- MODAL -->

<div class="modal fade" id="addProductModal">
  <div class="modal-dialog">
    <div class="modal-content">

      <form #productForm="ngForm" (ngSubmit)="addProduct(productForm)">

        <div class="modal-header">
          <h5 class="modal-title">Add Product</h5>
          <button class="btn-close" data-bs-dismiss="modal"></button>
        </div>

        <div class="modal-body">

          <input type="text" class="form-control mb-2" placeholder="Name"
            [(ngModel)]="newProduct.name" name="name">

          <input type="number" class="form-control mb-2" placeholder="Price"
            [(ngModel)]="newProduct.price" name="price">

          <input type="number" class="form-control mb-2" placeholder="Stock"
            [(ngModel)]="newProduct.stock" name="stock">

          <select class="form-control mb-2"
  [(ngModel)]="newProduct.category"
  name="category"
  (change)="onCategoryChange()">

  <option value="">Select Category</option>

  <option *ngFor="let cat of categories" [value]="cat._id">
    {{ cat.name }}
  </option>

</select>

<select *ngIf="types.length > 0"
  class="form-control mb-2"
  [(ngModel)]="newProduct.type"
  name="type">

  <option value="">Select Type</option>

  <option *ngFor="let t of types" [value]="t">
    {{ t }}
  </option>

</select>
          <input type="text" class="form-control mb-2" placeholder="Description"
            [(ngModel)]="newProduct.description" name="description">
      <input type="file" #fileInput class="form-control mb-2"
(change)="onImageUpload($event)">

        </div>

        <div class="modal-footer">
          <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button type="submit" class="btn btn-success" >Save</button>
        </div>

      </form>

    </div>
  </div>
</div>
