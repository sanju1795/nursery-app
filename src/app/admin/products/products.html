<div class="container-fluid">

  <!-- PAGE TITLE -->
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="fw-bold">Products</h2>

    <button class="btn btn-success" data-bs-toggle="modal" data-bs-target="#addProductModal">
      + Add Product
    </button>
  </div>


  <!-- PRODUCT TABLE -->
  <div class="card shadow-sm border-0">
    <div class="card-body">

      <table class="table table-hover align-middle">

        <thead class="table-light">
          <tr>
            <th>#</th>
            <th>Image</th>
            <th>Product Name</th>
            <th>Price</th>
            <th>Stock</th>
            <th>Action</th>
          </tr>
        </thead>

        <tbody>

          <tr *ngFor="let product of products; let i = index">
            <td>{{ i + 1 }}</td>

            <td>
              <img [src]="product.image" width="50" height="50" class="rounded">
            </td>

            <td>{{ product.name }}</td>
            <td>₹{{ product.price }}</td>
            <td>{{ product.stock }}</td>

            <td>
              <button class="btn btn-sm btn-primary me-2">
                Edit
              </button>

              <button class="btn btn-sm btn-danger" (click)="deleteProduct(i)">
                Delete
              </button>
            </td>

          </tr>

        </tbody>

      </table>

    </div>
  </div>

</div>


<!-- ADD PRODUCT MODAL -->

<div class="modal fade" id="addProductModal">
  <div class="modal-dialog">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title">Add Product</h5>
        <button class="btn-close" data-bs-dismiss="modal">Add</button>
      </div>

      <div class="modal-body">

        <div class="mb-3">
          <label>Product Name</label>
          <input type="text" class="form-control" [(ngModel)]="newProduct.name">
        </div>

        <div class="mb-3">
          <label>Price</label>
          <input type="number" class="form-control" [(ngModel)]="newProduct.price">
        </div>

        <div class="mb-3">
          <label>Stock</label>
          <input type="number" class="form-control" [(ngModel)]="newProduct.stock">
        </div>

        <div class="mb-3">
          <label>Image URL</label>
          <input type="text" class="form-control" [(ngModel)]="newProduct.image">
        </div>

      </div>

      <div class="modal-footer">

        <button class="btn btn-secondary" data-bs-dismiss="modal">
          Cancel
        </button>

        <button class="btn btn-success" (click)="addProduct()" data-bs-dismiss="modal">
          Save Product
        </button>

      </div>

    </div>
  </div>
</div>
