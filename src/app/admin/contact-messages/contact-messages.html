<div class="container">

  <h2>📩 Contact Messages - GreenNest 🌱</h2>

  <table>
    <thead>
      <tr>
        <th>Name</th>
        <th>Email</th>
        <th>Message</th>
        <th>Date</th>
        <th>Reply</th>
        <th>Action</th>
      </tr>
    </thead>

    <tbody>
      <tr *ngFor="let msg of messages,let i = index">
        <td>{{ msg.name }}</td>
        <td>{{ msg.email }}</td>
        <td>{{ msg.message }}</td>
        <td>{{ msg.createdAt | date:'short' }}</td>
         <textarea [(ngModel)]="msg.reply" placeholder="Write reply"></textarea>

    <button (click)="sendReply(msg)" >Reply</button>
        <td>
  <button (click)="deleteMessage(msg._id)">Delete</button>
</td>
      </tr>
    </tbody>

  </table>

</div>
