<div class="container-fluid">

  <!-- PAGE HEADER -->
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="fw-bold">Categories</h2>

    <button class="btn btn-success"
            data-bs-toggle="modal"
            data-bs-target="#categoryModal">
      + Add Category
    </button>
  </div>


  <!-- CATEGORY TABLE -->
  <div class="card shadow-sm border-0">

    <div class="card-body">
       <p>Total Categories: {{ categories.length }}</p>

      <table class="table table-hover align-middle">

        <thead class="table-light">
          <tr>
            <th>#</th>
            <th>Category Name</th>
            <th> Type </th>
            <th width="150">Action</th>
          </tr>
        </thead>

        <tbody>

          <tr *ngFor="let category of categories; let i=index">

            <td>{{i+1}}</td>

            <td class="fw-semibold">
              {{category.name}}
            </td>
            <td>
  <span *ngIf="category.types?.length > 0; else noType">
    {{ category.types.join(', ') }}
  </span>

  <ng-template #noType>
    <span class="text-muted">No Types</span>
  </ng-template>
</td>

            <td>
              <button class="btn btn-sm btn-primary me-2"
        (click)="openEditModal(category)">
  Edit
</button>

<button class="btn btn-sm btn-danger"
        (click)="deleteCategory(category._id)">
  Delete
</button>
            </td>

          </tr>

        </tbody>

      </table>

    </div>

  </div>

</div>


<!-- ADD CATEGORY MODAL -->

<div class="modal fade" id="categoryModal">

  <div class="modal-dialog">

    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title">Add Category</h5>
        <button class="btn-close" data-bs-dismiss="modal"></button>
      </div>


      <div class="modal-body">

        <input type="text"
               class="form-control"
               placeholder="Enter Category Name"
               [(ngModel)]="categoryName">

               <input type="text"
       class="form-control mt-2"
       placeholder="Enter Types (comma separated e.g. Indoor,Outdoor)"
       [(ngModel)]="categoryTypes">
      </div>


      <div class="modal-footer">

        <button class="btn btn-secondary"
                data-bs-dismiss="modal">
          Cancel
        </button>

        <button class="btn btn-success"
                (click)="addCategory()"
                data-bs-dismiss="modal">
          Add Category
        </button>

      </div>

    </div>

  </div>

</div>

<!-- 🔥 EDIT CATEGORY MODAL (AA AHIYA ADD KARVU) -->
<div class="modal fade" id="editCategoryModal">

<p>console.log("UPDATE WORKING");</p>
  <div class="modal-dialog">

    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title">Edit Category</h5>
        <button class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <form (ngSubmit)="updateCategory()">

  <div class="modal-body">

    <input type="text"
           class="form-control mb-2"
           placeholder="Category Name"
           [(ngModel)]="editCategoryName"
           name="name">

    <input type="text"
           class="form-control"
           placeholder="Types (comma separated)"
           [(ngModel)]="editCategoryTypes"
           name="types">

  </div>

  <div class="modal-footer">

    <button class="btn btn-secondary"
            data-bs-dismiss="modal">
      Cancel
    </button>

    <button type="submit" class="btn btn-success">
      Update
    </button>

  </div>

</form>

    </div>

  </div>

</div>
