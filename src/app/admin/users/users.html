<div class="container-fluid">

  <h2 class="fw-bold mb-4">Users</h2>

  <div class="card shadow-sm border-0">
    <div class="card-body">

      <table class="table table-hover align-middle">

        <thead class="table-light">
          <tr>
            <th>#</th>
            <th>Full Name</th>
            <th>Email</th>
          </tr>
        </thead>

        <tbody>

          <tr *ngFor="let user of users; let i=index">

            <td>{{i+1}}</td>

            <td>{{user.name}}</td>

            <td>{{user.email}}</td>

          </tr>

        </tbody>

      </table>

    </div>
  </div>

</div>
